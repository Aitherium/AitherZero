# AitherOS Alerting Rules
# 
# Critical alerts for SaaS-grade monitoring of AI agent infrastructure.

groups:
  # ===========================================================================
  # AGENT HEALTH ALERTS
  # ===========================================================================
  - name: agent-health
    interval: 30s
    rules:
      - alert: AgentDown
        expr: aither_agent_status == 0
        for: 2m
        labels:
          severity: critical
          layer: agents
        annotations:
          summary: "Agent {{ $labels.agent }} is unhealthy"
          description: "Agent {{ $labels.agent }} has not sent a heartbeat in over 90 seconds."
          
      - alert: AgentHeartbeatStale
        expr: aither_agent_status == 0.5
        for: 5m
        labels:
          severity: warning
          layer: agents
        annotations:
          summary: "Agent {{ $labels.agent }} heartbeat is stale"
          description: "Agent {{ $labels.agent }} heartbeat is delayed. May be under heavy load."
          
      - alert: AgentCodeIntegrityViolation
        expr: aither_agent_code_verified == 0
        for: 1m
        labels:
          severity: critical
          layer: security
        annotations:
          summary: "Agent {{ $labels.agent }} code verification failed"
          description: "Agent {{ $labels.agent }} may have been modified. Security investigation required."
          
      - alert: NoHealthyAgents
        expr: aither_agents_healthy == 0 and aither_agents_total > 0
        for: 2m
        labels:
          severity: critical
          layer: agents
        annotations:
          summary: "No healthy agents available"
          description: "All {{ $value }} registered agents are unhealthy."

  # ===========================================================================
  # SERVICE HEALTH ALERTS
  # ===========================================================================
  - name: service-health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: aither_service_status == 0
        for: 2m
        labels:
          severity: critical
          layer: core
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Service {{ $labels.service }} on port {{ $labels.port }} has been offline for 2 minutes."
          
      - alert: ServiceDegraded
        expr: aither_service_status == 0.5
        for: 5m
        labels:
          severity: warning
          layer: core
        annotations:
          summary: "Service {{ $labels.service }} is degraded"
          description: "Service {{ $labels.service }} is experiencing issues."
          
      - alert: CriticalServicesDown
        expr: count(aither_service_status == 0) >= 3
        for: 1m
        labels:
          severity: critical
          layer: core
        annotations:
          summary: "Multiple critical services down"
          description: "{{ $value }} services are currently offline."
          
      - alert: LowServiceAvailability
        expr: (aither_services_online / aither_services_total) < 0.8
        for: 5m
        labels:
          severity: warning
          layer: core
        annotations:
          summary: "Service availability below 80%"
          description: "Only {{ $value | humanizePercentage }} of services are online."

  # ===========================================================================
  # SYSTEM RESOURCE ALERTS
  # ===========================================================================
  - name: system-resources
    interval: 30s
    rules:
      - alert: HighMemoryUsage
        expr: aither_memory_ram_percent > 90
        for: 5m
        labels:
          severity: warning
          layer: infrastructure
        annotations:
          summary: "High RAM usage detected"
          description: "System RAM usage is at {{ $value }}%."
          
      - alert: CriticalMemoryUsage
        expr: aither_memory_ram_percent > 95
        for: 2m
        labels:
          severity: critical
          layer: infrastructure
        annotations:
          summary: "Critical RAM usage - system at risk"
          description: "System RAM usage is critically high at {{ $value }}%. OOM killer may activate."
          
      - alert: PageFileExhausted
        expr: aither_memory_pagefile_percent > 85
        for: 5m
        labels:
          severity: critical
          layer: infrastructure
        annotations:
          summary: "Page file exhausted"
          description: "Page file usage at {{ $value }}%. System may become unstable."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          layer: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for 10 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
          layer: infrastructure
        annotations:
          summary: "Disk space low on {{ $labels.device }}"
          description: "Only {{ $value | humanizePercentage }} disk space remaining."

  # ===========================================================================
  # AGENT PERFORMANCE ALERTS
  # ===========================================================================
  - name: agent-performance
    interval: 60s
    rules:
      - alert: AgentHighLatency
        expr: histogram_quantile(0.99, rate(aither_agent_request_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          layer: agents
        annotations:
          summary: "High latency for agent {{ $labels.agent }}"
          description: "p99 latency for {{ $labels.agent }} is {{ $value | humanizeDuration }}."
          
      - alert: AgentHighErrorRate
        expr: rate(aither_agent_requests_total{status="error"}[5m]) / rate(aither_agent_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          layer: agents
        annotations:
          summary: "High error rate for agent {{ $labels.agent }}"
          description: "Agent {{ $labels.agent }} has {{ $value | humanizePercentage }} error rate."
          
      - alert: AgentQueueBacklog
        expr: aither_agent_queue_depth > 100
        for: 5m
        labels:
          severity: warning
          layer: agents
        annotations:
          summary: "Agent {{ $labels.agent }} has large queue backlog"
          description: "{{ $value }} requests pending for {{ $labels.agent }}."

  # ===========================================================================
  # LLM / INFERENCE ALERTS
  # ===========================================================================
  - name: llm-health
    interval: 60s
    rules:
      - alert: OllamaDown
        expr: up{job="ollama"} == 0
        for: 2m
        labels:
          severity: critical
          layer: external
        annotations:
          summary: "Ollama LLM server is down"
          description: "Ollama is unreachable. AI capabilities are impaired."
          
      - alert: HighTokenBurnRate
        expr: rate(aither_llm_tokens_total[5m]) > 10000
        for: 10m
        labels:
          severity: warning
          layer: cognition
        annotations:
          summary: "High token consumption rate"
          description: "Token burn rate is {{ $value }} tokens/second. Cost may be high."

  # ===========================================================================
  # SECURITY ALERTS
  # ===========================================================================
  - name: security
    interval: 30s
    rules:
      - alert: SecurityAlertFired
        expr: increase(aither_security_alerts_total[5m]) > 0
        labels:
          severity: critical
          layer: security
        annotations:
          summary: "Security alert triggered"
          description: "{{ $value }} security alerts in the last 5 minutes."
          
      - alert: UnauthorizedAccessAttempt
        expr: increase(aither_auth_failures_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
          layer: security
        annotations:
          summary: "Multiple authentication failures"
          description: "{{ $value }} auth failures in 5 minutes. Possible brute force attempt."

  # ===========================================================================
  # DARK FACTORY — Learning Loop & Self-Improvement Alerts
  # ===========================================================================
  - name: dark-factory
    interval: 60s
    rules:
      - alert: DarkFactoryDown
        expr: up{job="aitheros-dark-factory"} == 0
        for: 5m
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "DarkFactory service is down"
          description: "The autonomous self-improvement orchestrator is unreachable."

      - alert: LearningLoopStalled
        expr: dark_factory_loop_runs_total == 0
        for: 24h
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "No learning loop runs in 24 hours"
          description: "The closed-loop learning system has not executed. Check DarkFactory /loop/status."

      - alert: LearningLoopHighFailureRate
        expr: (dark_factory_loop_failures_total / dark_factory_loop_runs_total) > 0.5
        for: 6h
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "Learning loop failure rate above 50%"
          description: "{{ $value | humanizePercentage }} of learning loop runs are failing."

      - alert: ModelRollbackTriggered
        expr: increase(dark_factory_model_rollbacks_total[1h]) > 0
        labels:
          severity: info
          layer: automation
        annotations:
          summary: "Model rollback triggered"
          description: "A deployed model was rolled back due to regression in the last hour."

      - alert: ConsecutiveModelRollbacks
        expr: increase(dark_factory_model_rollbacks_total[6h]) >= 3
        for: 1m
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "Multiple model rollbacks in 6 hours"
          description: "{{ $value }} rollbacks suggest unstable training data or pipeline issue."

      - alert: RemediationHighRate
        expr: rate(dark_factory_remediation_actions_total[1h]) > 10
        for: 30m
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "High remediation rate — possible cascading failures"
          description: "{{ $value }} remediation actions per second in the last hour."

      - alert: RemediationFailures
        expr: (dark_factory_remediation_failures_total / dark_factory_remediation_actions_total) > 0.3
        for: 2h
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "Remediation failure rate above 30%"
          description: "Known-fix patterns are failing at {{ $value | humanizePercentage }}. Review patterns."

      - alert: SelfModificationBlocked
        expr: increase(dark_factory_self_mod_blocked_total[6h]) > 5
        for: 1m
        labels:
          severity: info
          layer: automation
        annotations:
          summary: "Self-modification requests being blocked"
          description: "{{ $value }} code modification attempts were blocked by safety gates."

      - alert: TrainingPipelineDown
        expr: up{job="aitheros-training-pipeline"} == 0
        for: 10m
        labels:
          severity: warning
          layer: training
        annotations:
          summary: "Training pipeline is down"
          description: "The Prism/Trainer/Harvest compound service is unreachable."

      - alert: NoTrainingDataHarvested
        expr: increase(dark_factory_harvest_records_total[24h]) == 0
        for: 24h
        labels:
          severity: info
          layer: training
        annotations:
          summary: "No training data harvested in 24 hours"
          description: "The harvest sweep routine has not collected any new data."

  # ===========================================================================
  # AUTOMATION & INFRASTRUCTURE HEALTH
  # ===========================================================================
  - name: automation-health
    interval: 60s
    rules:
      - alert: AutomationCoreDown
        expr: up{job="aitheros-automation-core"} == 0
        for: 5m
        labels:
          severity: critical
          layer: automation
        annotations:
          summary: "AutomationCore compound is down"
          description: "Autonomic + AutomatedActions is unreachable. Auto-remediation is impaired."

      - alert: MicroSchedulerDown
        expr: up{job="aitheros-microscheduler"} == 0
        for: 2m
        labels:
          severity: critical
          layer: cognition
        annotations:
          summary: "MicroScheduler is down — ALL LLM routing offline"
          description: "MicroScheduler:8150 is unreachable. No LLM calls can complete."

      - alert: HighPainScore
        expr: aither_pain_score > 0.8
        for: 10m
        labels:
          severity: warning
          layer: automation
        annotations:
          summary: "High system pain score"
          description: "Pain score is {{ $value }}. Autonomic or DarkFactory should be remediating."

