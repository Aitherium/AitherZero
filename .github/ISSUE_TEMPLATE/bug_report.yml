name: Bug Report
description: Report a bug in AitherZero
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I run Invoke-AitherScript 1001, it fails with...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Import module: `Import-Module ./AitherZero.psd1`
        2. Run: `...`
        3. See error: `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details.
      value: |
        - OS: [e.g., Windows 11, Ubuntu 24.04, macOS 15]
        - PowerShell version: [run `$PSVersionTable.PSVersion`]
        - AitherZero version: [run `(Get-Module AitherZero).Version`]
        - Docker version (if relevant): [run `docker --version`]
        - OpenTofu version (if relevant): [run `tofu --version`]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output or error messages.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Core Module
        - Configuration System
        - Script Execution
        - Playbook Orchestration
        - Docker/Container
        - Deployment
        - OpenTofu/Infrastructure
        - MCP Server
        - Logging
        - Plugin System
        - Other
    validations:
      required: true
