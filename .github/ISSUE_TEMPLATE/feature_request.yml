name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What's the use case?
      placeholder: I'm trying to deploy my app to AWS but there's no built-in...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Where should this live?
      description: Is this a core feature or better suited as a plugin?
      options:
        - Core (benefits all users)
        - Plugin (project-specific)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - New automation script
        - New playbook template
        - New OpenTofu module
        - Configuration system
        - Orchestration engine
        - MCP server
        - Plugin system
        - Docker/Container
        - Documentation
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
