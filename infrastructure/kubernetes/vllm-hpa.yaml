# =============================================================================
# AitherOS — vLLM Horizontal Pod Autoscaler
# =============================================================================
# Autoscales vLLM inference workers based on GPU utilization and queue depth.
# Requires NVIDIA DCGM exporter + Prometheus adapter for GPU metrics.
#
# Cost model (GCP L4 spot):
#   1 replica  = ~$0.35/hr = ~$252/mo → handles ~50 concurrent users
#   3 replicas = ~$1.05/hr = ~$756/mo → handles ~150 concurrent users
#   Scale-to-zero when idle (minReplicas: 0 with KEDA, or 1 without)
#
# Deploy: kubectl apply -f vllm-hpa.yaml -n aitheros
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: aitheros
  labels:
    app.kubernetes.io/part-of: aitheros
---
# ── vLLM Orchestrator (fast, small model for chat routing) ──────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-orchestrator
  namespace: aitheros
  labels:
    app: vllm-orchestrator
    tier: inference
    model-class: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-orchestrator
  template:
    metadata:
      labels:
        app: vllm-orchestrator
        tier: inference
        model-class: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8200"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: ghcr.io/aitherium/aitheros-vllm:latest
          ports:
            - containerPort: 8200
              name: http
          env:
            - name: MODEL_NAME
              value: "nvidia/Nemotron-Orchestrator-8B"
            - name: VLLM_PORT
              value: "8200"
            - name: MAX_MODEL_LEN
              value: "32768"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.85"
            - name: DTYPE
              value: "auto"
            - name: QUANTIZATION
              value: "awq"
            - name: ENABLE_TORCH_COMPILE
              value: "true"
            - name: TORCH_COMPILE_LEVEL
              value: "3"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 180
            periodSeconds: 30
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-orchestrator
  namespace: aitheros
spec:
  selector:
    app: vllm-orchestrator
  ports:
    - port: 8200
      targetPort: 8200
      name: http
  type: ClusterIP
---
# ── vLLM Reasoning (larger model for deep thinking) ────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-reasoning
  namespace: aitheros
  labels:
    app: vllm-reasoning
    tier: inference
    model-class: reasoning
spec:
  replicas: 0  # Scale-to-zero by default, HPA brings up on demand
  selector:
    matchLabels:
      app: vllm-reasoning
  template:
    metadata:
      labels:
        app: vllm-reasoning
        tier: inference
        model-class: reasoning
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8201"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: vllm
          image: ghcr.io/aitherium/aitheros-vllm:latest
          ports:
            - containerPort: 8201
              name: http
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen3-Coder-REAP-25B-A3B"
            - name: VLLM_PORT
              value: "8201"
            - name: MAX_MODEL_LEN
              value: "32768"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.90"
            - name: DTYPE
              value: "auto"
          resources:
            requests:
              cpu: "2"
              memory: "12Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8201
            initialDelaySeconds: 180
            periodSeconds: 10
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-reasoning
  namespace: aitheros
spec:
  selector:
    app: vllm-reasoning
  ports:
    - port: 8201
      targetPort: 8201
  type: ClusterIP
---
# ── Ollama (free tier, CPU-only, always on) ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: aitheros
  labels:
    app: ollama
    tier: inference
    model-class: free
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        tier: inference
        model-class: free
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_MODELS
              value: "llama3.2:3b"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
      # CPU-only node — no GPU needed for 3B model
      nodeSelector:
        cloud.google.com/gke-spot: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: aitheros
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
---
# =============================================================================
# Horizontal Pod Autoscalers
# =============================================================================

# ── HPA: vLLM Orchestrator — scale 1→5 on GPU util + request rate ──────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-orchestrator-hpa
  namespace: aitheros
  labels:
    app: vllm-orchestrator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-orchestrator
  minReplicas: 1
  maxReplicas: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120  # Add 1 pod every 2 min max
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
  metrics:
    # GPU utilization via DCGM exporter (requires prometheus-adapter)
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "75"  # Scale up when GPU >75% utilized
    # CPU as fallback metric
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ── HPA: vLLM Reasoning — scale 0→3 on demand ─────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-reasoning-hpa
  namespace: aitheros
  labels:
    app: vllm-reasoning
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-reasoning
  minReplicas: 0  # Scale to zero when no enterprise traffic
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30  # React quickly to enterprise requests
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600  # Keep warm for 10 min after last request
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
  metrics:
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "70"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
# ── HPA: Ollama free tier — scale 1→3 on CPU ───────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ollama-hpa
  namespace: aitheros
  labels:
    app: ollama
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ollama
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 600
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
# =============================================================================
# Gateway / API Ingress
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aither-gateway
  namespace: aitheros
  labels:
    app: aither-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aither-gateway
  template:
    metadata:
      labels:
        app: aither-gateway
        tier: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/aitherium/aitheros-node:latest
          ports:
            - containerPort: 8080
          env:
            - name: AITHER_DOCKER_MODE
              value: "true"
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
            - name: VLLM_ORCHESTRATOR_URL
              value: "http://vllm-orchestrator:8200"
            - name: VLLM_REASONING_URL
              value: "http://vllm-reasoning:8201"
            - name: AITHERACTA_URL
              value: "http://aither-acta:8206"
            - name: AITHER_IDENTITY_URL
              value: "http://aither-identity:8112"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aither-gateway
  namespace: aitheros
  annotations:
    # Cloudflare Tunnel connects here — no public LB needed
    cloudflare.com/tunnel: "aitheros-prod"
spec:
  selector:
    app: aither-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aither-gateway-hpa
  namespace: aitheros
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aither-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
