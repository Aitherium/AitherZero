name: Plugin Request
description: Request a new plugin or plugin feature
title: "[Plugin]: "
labels: ["plugin", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new plugin for AitherZero or improvements to an existing one.

  - type: input
    id: plugin-name
    attributes:
      label: Plugin name
      description: What would this plugin be called?
      placeholder: aws-ecs-deploy
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would this plugin do? What infrastructure/workflow does it automate?
      placeholder: This plugin would automate deploying containerized applications to AWS ECS with Fargate...
    validations:
      required: true

  - type: textarea
    id: scripts
    attributes:
      label: Expected automation scripts
      description: What scripts should this plugin provide?
      value: |
        - Deploy: `3001_Deploy-ECS.ps1`
        - Teardown: `3002_Destroy-ECS.ps1`
        - Status: `4001_Get-ECSStatus.ps1`

  - type: textarea
    id: opentofu
    attributes:
      label: OpenTofu modules needed
      description: What infrastructure would this provision?
      placeholder: |
        - ECS cluster
        - Fargate task definitions
        - ALB + target groups
        - ECR registry

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to build this plugin
        - label: I have experience with this infrastructure
