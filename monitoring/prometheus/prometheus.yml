# AitherOS Prometheus Configuration
# 
# Scrapes metrics from all AitherOS services for comprehensive observability.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aitheros-monitor'
    environment: 'development'

# Alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files for alerting
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ===========================================================================
  # PROMETHEUS SELF-MONITORING
  # ===========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          layer: 'monitoring'

  # ===========================================================================
  # AITHEROS CORE METRICS (Primary Source)
  # ===========================================================================
  
  # AitherWatch - Primary metrics endpoint (aggregates all service & agent status)
  - job_name: 'aitheros-watch'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'AitherWatch'
          layer: 'core'
    metrics_path: /metrics
    
  # AitherPulse - Event system metrics (Prometheus format)
  - job_name: 'aitheros-pulse'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'AitherPulse'
          layer: 'core'
    metrics_path: /metrics/prometheus
    
  # AitherGateway - Agent registration metrics
  - job_name: 'aitheros-gateway'
    static_configs:
      - targets: ['host.docker.internal:8120']
        labels:
          service: 'AitherGateway'
          layer: 'agents'
    metrics_path: /metrics

  # ===========================================================================
  # AGENT METRICS - Detailed per-agent performance
  # ===========================================================================
  
  # NarrativeAgent
  - job_name: 'agent-narrative'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8770']
        labels:
          agent: 'NarrativeAgent'
          layer: 'agents'
    metrics_path: /metrics
    
  # Demiurge (AI Craftsman)
  - job_name: 'agent-demiurge'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8140']
        labels:
          agent: 'Demiurge'
          layer: 'agents'
    metrics_path: /metrics
    
  # Director (Agent orchestrator)
  - job_name: 'agent-director'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8774']
        labels:
          agent: 'Director'
          layer: 'agents'
    metrics_path: /metrics

  # Council (Multi-agent coordination)
  - job_name: 'agent-council'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8765']
        labels:
          agent: 'Council'
          layer: 'agents'
    metrics_path: /metrics

  # ===========================================================================
  # INFRASTRUCTURE METRICS
  # ===========================================================================
  
  # Node Exporter - Host system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          layer: 'infrastructure'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          layer: 'infrastructure'

  # ===========================================================================
  # COGNITION LAYER
  # ===========================================================================
  
  - job_name: 'aitheros-llm'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8118']
        labels:
          service: 'AitherLLM'
          layer: 'cognition'
    metrics_path: /metrics

  - job_name: 'aitheros-reasoning'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8093']
        labels:
          service: 'AitherReasoning'
          layer: 'cognition'
    metrics_path: /metrics

  # ===========================================================================
  # MEMORY LAYER
  # ===========================================================================
  
  - job_name: 'aitheros-workingmemory'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8101']
        labels:
          service: 'WorkingMemory'
          layer: 'memory'
    metrics_path: /metrics

  # ===========================================================================
  # SECURITY LAYER
  # ===========================================================================
  
  - job_name: 'aitheros-identity'
    static_configs:
      - targets: ['host.docker.internal:8112']
        labels:
          service: 'AitherIdentity'
          layer: 'security'
    metrics_path: /metrics

  # ===========================================================================
  # EXTERNAL SERVICES
  # ===========================================================================
  
  # Ollama (when running in docker)
  - job_name: 'ollama'
    scrape_interval: 60s
    static_configs:
      - targets: ['host.docker.internal:11434']
        labels:
          service: 'Ollama'
          layer: 'external'
    metrics_path: /api/metrics

  # ===========================================================================
  # DARK FACTORY — Autonomous Self-Improvement Loop
  # ===========================================================================

  - job_name: 'aitheros-dark-factory'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8211']
        labels:
          service: 'DarkFactory'
          layer: 'automation'
    metrics_path: /metrics

  # ===========================================================================
  # AUTOMATION CORE — Autonomic + AutomatedActions compound
  # ===========================================================================

  - job_name: 'aitheros-automation-core'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:8095']
        labels:
          service: 'AutomationCore'
          layer: 'automation'
    metrics_path: /metrics

  # ===========================================================================
  # TRAINING PIPELINE — Prism + Trainer + Harvest + Evolution + Learning
  # ===========================================================================

  - job_name: 'aitheros-training-pipeline'
    scrape_interval: 60s
    static_configs:
      - targets: ['host.docker.internal:8106']
        labels:
          service: 'TrainingPipeline'
          layer: 'training'
    metrics_path: /metrics

  # ===========================================================================
  # MICROSCHEDULER — LLM routing and scheduling
  # ===========================================================================

  - job_name: 'aitheros-microscheduler'
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8150']
        labels:
          service: 'MicroScheduler'
          layer: 'cognition'
    metrics_path: /metrics

